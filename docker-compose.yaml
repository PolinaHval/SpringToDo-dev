version: "3"
services:
  postgres:
    image: "postgres:13.4-alpine"
    container_name: "main"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "todo"
    ports:
      - "35432:5432"

  redis:
   image: "redis:7.2"
   container_name: "redis"
   restart: "unless-stopped"
   ports:
     - "6379:6379"